upstream backend_cluster {
    server backend:3000;
}

server {  
    listen 80;  
    server_name odzfishdeliveryapp.myftp.biz;  
  
    location /.well-known/acme-challenge/ {  
        root /var/www/certbot;  
    }  
  
    location / {  
        proxy_pass http://backend_cluster;  
  
        proxy_http_version 1.1;  
        proxy_set_header Host $host;  
    }  
}