on:  
  push:  
    branches:  
      - main  
  pull_request:  
    branches:  
      - main  
  
jobs:  
  backend-ci:  
    runs-on: ubuntu-latest

    env:
      DB_HOST: localhost
      DB_USER: odz_admin
      DB_PASS: 1234
      DB_NAME: employee_profile
      DB_PORT: 5432
      JWT_SECRET: 1234
      JWT_EXPIRES_IN: 1d  
  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v3  
  
      - name: Setup Node  
        uses: actions/setup-node@v3  
        with:  
          node-version: 18  
  
      - name: Install dependencies  
        run: npm install  
  
      - name: Run tests  
        run: npm test  
  
      - name: Build Docker image  
        run: docker build -t employee-profile-api .