name: Backend CI

on:
  push:
    branches: [main]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    # --------------------------
    # SERVICES
    # --------------------------
    services:
      # PostgreSQL service for testing
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odz_admin
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: employee_profile
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odz_admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # --------------------------
    # ENVIRONMENT VARIABLES
    # --------------------------

    # Set environment variables for the application
    env:
      DB_HOST: localhost
      DB_USER: odz_admin
      DB_PASS: 1234
      DB_NAME: employee_profile
      DB_PORT: 5432
      JWT_SECRET: 1234
      JWT_EXPIRES_IN: 1d

    # --------------------------
    # STEPS
    # --------------------------
    steps:
      # --------------------------
      # CHECKOUT CODE
      # --------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # --------------------------
      # SETUP NODE AND INSTALL DEPENDENCIES
      # --------------------------
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # --------------------------
      # INSTALL DEPENDENCIES AND RUN TESTS
      # --------------------------
      - name: Install dependencies
        run: npm install

      - name: Run Sequelize migrations
        run: npx sequelize-cli db:migrate

      - name: Run tests
        run: npm test

      # --------------------------
      # BUILD DOCKER IMAGE
      # --------------------------

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/employee-profile-api .

      # --------------------------
      # LOGIN TO DOCKERHUB
      # --------------------------

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --------------------------
      # PUSH IMAGE
      # --------------------------

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/employee-profile-api:latest

      # --------------------------
      # DEPLOY TO EC2
      # --------------------------

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            cd ~/employee-profile 
            
            echo "Pull latest code..." 
            git fetch origin 
            git reset --hard origin/main 
            
            echo "Pull latest images..." 
            docker-compose pull 
            
            echo "Recreate containers..." 
            docker-compose down 
            docker-compose up -d 
            
            echo "Cleanup unused images..." 
            docker image prune -f


# How does CI/CD work in this workflow?
# In this workflow, CI/CD is implemented through a series of automated steps that are triggered whenever there is a push to the main branch. The workflow includes the following stages:
# 1. Checkout code: This step checks out the code from the repository.
# 2. Setup Node: This step sets up the Node.js environment.
# 3. Install dependencies and run tests: This step installs the dependencies and runs the tests.
# 4. Build Docker image: This step builds a Docker image for the application.
# 5. Login to DockerHub: This step logs in to DockerHub.
# 6. Push Docker image: This step pushes the Docker image to DockerHub.
# 7. Deploy to EC2: This step deploys the application to an EC2 instance. The deployment process includes pulling the latest code, pulling the latest Docker images, recreating the containers, and cleaning up unused images. This entire process is automated, ensuring that any changes pushed to the main branch are automatically tested and deployed without manual intervention.